<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETRIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #020204;
            --bg-board: #06060c;
            --bg-panel: rgba(8, 8, 16, 0.9);
            --border-dim: #12121e;
            --glow-green: #33ff88;
            --glow-green-dim: rgba(51, 255, 136, 0.12);
            --text-warm: #d4a856;
            --text-dim: #556655;
            --neon-cyan: #00ffff;
            --neon-blue: #4466ff;
            --neon-orange: #ff8811;
            --neon-yellow: #ffee00;
            --neon-green: #00ff44;
            --neon-purple: #cc22ff;
            --neon-red: #ff2244;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-void);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Press Start 2P', monospace;
            color: #fff;
            overflow: hidden;
        }

        /* ===== CRT EFFECTS ===== */
        .crt-scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                transparent 2px,
                rgba(0, 0, 0, 0.08) 2px,
                rgba(0, 0, 0, 0.08) 4px
            );
            animation: scanline-drift 8s linear infinite;
        }

        @keyframes scanline-drift {
            0% { background-position-y: 0; }
            100% { background-position-y: 4px; }
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
            background: radial-gradient(
                ellipse at center,
                transparent 50%,
                rgba(0, 0, 0, 0.5) 100%
            );
        }

        /* ===== GAME WRAPPER (Cabinet) ===== */
        .game-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 20px;
            background: linear-gradient(180deg, rgba(14, 14, 28, 0.97), rgba(6, 6, 16, 0.99));
            border: 1px solid rgba(51, 255, 136, 0.05);
            border-radius: 16px;
            box-shadow:
                0 4px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
            position: relative;
            z-index: 1;
        }

        /* ===== LEFT PANEL ===== */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 164px;
        }

        /* ===== CENTER COLUMN ===== */
        .center-column {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-bar {
            display: flex;
            align-items: baseline;
            gap: 12px;
            padding-bottom: 10px;
            width: 100%;
            justify-content: center;
        }

        .score-label {
            font-size: 9px;
            color: var(--glow-green);
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(51, 255, 136, 0.4);
        }

        .score-value {
            font-size: 22px;
            color: var(--text-warm);
            text-shadow: 0 0 12px rgba(212, 168, 86, 0.4);
        }

        /* ===== BOARD FRAME ===== */
        .board-frame {
            padding: 2px;
            background: #08080e;
            border: 1px solid rgba(51, 255, 136, 0.08);
            border-radius: 4px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.05s ease-out;
            line-height: 0;
        }

        .game-board {
            display: block;
            border-radius: 2px;
        }

        /* ===== RIGHT PANEL ===== */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 164px;
        }

        /* ===== PANEL BOX ===== */
        .panel-box {
            background: var(--bg-panel);
            border: 1px solid var(--glow-green-dim);
            border-radius: 6px;
            padding: 12px;
            box-shadow:
                0 0 12px rgba(0, 255, 136, 0.02),
                inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .panel-label {
            font-size: 8px;
            color: var(--glow-green);
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-shadow: 0 0 8px rgba(51, 255, 136, 0.4);
        }

        .piece-canvas {
            background: var(--bg-board);
            border-radius: 3px;
            display: block;
            margin: 0 auto;
        }

        /* ===== STATS BOX ===== */
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 6px 0;
        }

        .stat-row + .stat-row {
            border-top: 1px solid rgba(51, 255, 136, 0.05);
        }

        .stat-label {
            font-size: 8px;
            color: var(--glow-green);
            letter-spacing: 2px;
            text-shadow: 0 0 6px rgba(51, 255, 136, 0.3);
        }

        .stat-val {
            font-size: 18px;
            color: var(--text-warm);
            text-shadow: 0 0 10px rgba(212, 168, 86, 0.3);
        }

        .lines-detail {
            font-size: 7px;
            color: var(--text-dim);
            margin-top: 6px;
            text-align: right;
            line-height: 1.6;
        }

        /* ===== LEVEL BOX ===== */
        .level-big {
            font-size: 36px;
            text-align: center;
            color: var(--text-warm);
            text-shadow: 0 0 15px rgba(212, 168, 86, 0.5);
            padding: 8px 0;
        }

        /* ===== CONTROLS ===== */
        .controls-box {
            margin-top: auto;
        }

        .controls {
            font-size: 7px;
            line-height: 2.4;
            color: #445544;
        }

        kbd {
            display: inline-block;
            background: #0e0e1a;
            border: 1px solid rgba(51, 255, 136, 0.2);
            border-bottom: 2px solid rgba(51, 255, 136, 0.15);
            border-radius: 3px;
            padding: 1px 5px;
            font-family: 'Press Start 2P', monospace;
            font-size: 6px;
            color: var(--glow-green);
            text-shadow: 0 0 4px rgba(51, 255, 136, 0.3);
        }

        /* ===== OVERLAY SCREENS ===== */
        .start-screen,
        .game-over-screen,
        .victory-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 2, 4, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        /* ===== TITLE ===== */
        .game-title {
            font-size: 52px;
            margin-bottom: 48px;
            letter-spacing: 12px;
            display: flex;
            gap: 4px;
        }

        .game-title span {
            color: var(--glow);
            text-shadow:
                0 0 10px var(--glow),
                0 0 25px var(--glow),
                0 0 50px var(--glow),
                0 0 80px var(--glow);
            animation: letter-pulse 2.5s ease-in-out infinite;
            animation-delay: calc(var(--i, 0) * 0.2s);
        }

        @keyframes letter-pulse {
            0%, 100% {
                text-shadow:
                    0 0 10px var(--glow),
                    0 0 25px var(--glow),
                    0 0 50px var(--glow);
                opacity: 0.85;
            }
            50% {
                text-shadow:
                    0 0 15px var(--glow),
                    0 0 35px var(--glow),
                    0 0 70px var(--glow),
                    0 0 100px var(--glow);
                opacity: 1;
            }
        }

        .screen-title {
            font-size: 42px;
            margin-bottom: 36px;
            letter-spacing: 6px;
        }

        .game-over-title {
            color: var(--neon-red);
            text-shadow:
                0 0 15px var(--neon-red),
                0 0 40px var(--neon-red),
                0 0 80px rgba(255, 34, 68, 0.4);
            animation: game-over-flicker 3s ease-in-out infinite;
        }

        @keyframes game-over-flicker {
            0%, 94%, 100% { opacity: 1; }
            95% { opacity: 0.6; }
            96% { opacity: 1; }
            97% { opacity: 0.7; }
        }

        .victory-title {
            color: var(--neon-yellow);
            text-shadow:
                0 0 15px var(--neon-yellow),
                0 0 40px var(--neon-yellow),
                0 0 80px rgba(255, 238, 0, 0.4);
            animation: victory-glow 1.5s ease-in-out infinite;
        }

        @keyframes victory-glow {
            0%, 100% {
                text-shadow:
                    0 0 15px var(--neon-yellow),
                    0 0 40px var(--neon-yellow);
            }
            50% {
                text-shadow:
                    0 0 20px var(--neon-yellow),
                    0 0 60px var(--neon-yellow),
                    0 0 100px rgba(255, 238, 0, 0.3);
            }
        }

        /* ===== LEVEL SELECT ===== */
        .level-select {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .level-select h2 {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 3px;
        }

        .level-buttons {
            display: grid;
            grid-template-columns: repeat(5, 48px);
            gap: 8px;
            justify-content: center;
        }

        .level-btn {
            width: 48px;
            height: 48px;
            border: 1px solid var(--border-dim);
            border-radius: 4px;
            background: #0a0a14;
            color: #556655;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 3px 0 #000;
        }

        .level-btn:hover {
            color: var(--glow-green);
            border-color: rgba(51, 255, 136, 0.3);
            box-shadow: 0 3px 0 #000, 0 0 15px rgba(51, 255, 136, 0.1);
            transform: translateY(-1px);
        }

        .level-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #000;
        }

        .level-btn.selected {
            color: var(--glow-green);
            border-color: var(--glow-green);
            background: rgba(51, 255, 136, 0.06);
            box-shadow: 0 3px 0 #000, 0 0 20px rgba(51, 255, 136, 0.15);
            text-shadow: 0 0 8px rgba(51, 255, 136, 0.5);
        }

        /* ===== BUTTONS ===== */
        .start-btn {
            padding: 16px 40px;
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            border: 2px solid var(--glow-green);
            border-radius: 4px;
            background: transparent;
            color: var(--glow-green);
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(51, 255, 136, 0.4);
            box-shadow: 0 0 20px rgba(51, 255, 136, 0.08);
            position: relative;
            overflow: hidden;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(51, 255, 136, 0.08), transparent);
            animation: btn-shine 3s ease-in-out infinite;
        }

        @keyframes btn-shine {
            0%, 100% { left: -100%; }
            50% { left: 100%; }
        }

        .start-btn:hover {
            background: rgba(51, 255, 136, 0.06);
            box-shadow: 0 0 30px rgba(51, 255, 136, 0.15);
            transform: scale(1.02);
        }

        .start-btn:active {
            transform: scale(0.98);
        }

        .final-score {
            font-size: 12px;
            color: var(--text-warm);
            margin-bottom: 16px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(212, 168, 86, 0.3);
        }

        /* ===== PAUSE ===== */
        .paused-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 2, 4, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            font-size: 36px;
            color: var(--glow-green);
            letter-spacing: 8px;
            text-shadow:
                0 0 15px var(--glow-green),
                0 0 40px rgba(51, 255, 136, 0.3);
            animation: pause-blink 1.2s step-end infinite;
        }

        @keyframes pause-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ===== POPUPS ===== */
        .popup-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 40;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .popup {
            font-family: 'Press Start 2P', monospace;
            font-size: 16px;
            font-weight: normal;
            text-align: center;
            white-space: nowrap;
            animation: popup-burst 1s ease-out forwards;
        }

        @keyframes popup-burst {
            0% { opacity: 1; transform: scale(2); filter: blur(3px); }
            15% { opacity: 1; transform: scale(1); filter: blur(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: scale(0.9) translateY(-30px); }
        }

        .popup.combo {
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan), 0 0 30px rgba(0, 255, 255, 0.3);
        }
        .popup.tspin {
            color: var(--neon-purple);
            text-shadow: 0 0 15px var(--neon-purple), 0 0 30px rgba(204, 34, 255, 0.3);
        }
        .popup.b2b {
            color: var(--neon-yellow);
            text-shadow: 0 0 15px var(--neon-yellow), 0 0 30px rgba(255, 238, 0, 0.3);
        }
        .popup.levelup {
            color: var(--neon-green);
            text-shadow: 0 0 15px var(--neon-green), 0 0 30px rgba(0, 255, 68, 0.3);
        }
        .popup.tetris {
            color: var(--neon-orange);
            text-shadow: 0 0 15px var(--neon-orange), 0 0 30px rgba(255, 136, 17, 0.3);
            font-size: 22px;
        }

        .hidden {
            display: none !important;
        }

        /* ===== AMBIENT BACKGROUND ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(204, 34, 255, 0.015) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 255, 136, 0.01) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }

        /* ===== MOBILE TOUCH CONTROLS ===== */
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 90;
            padding: 8px 12px 16px;
            background: linear-gradient(to top, rgba(2, 2, 4, 0.95) 60%, transparent);
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .touch-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .touch-row:last-child {
            margin-bottom: 0;
        }

        .touch-row-left,
        .touch-row-right {
            display: flex;
            gap: 8px;
        }

        .touch-btn {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            border: 1px solid rgba(51, 255, 136, 0.25);
            background: rgba(8, 8, 16, 0.85);
            color: var(--glow-green);
            font-family: 'Press Start 2P', monospace;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            text-shadow: 0 0 6px rgba(51, 255, 136, 0.4);
            transition: background 0.1s, border-color 0.1s;
        }

        .touch-btn:active, .touch-btn.active {
            background: rgba(51, 255, 136, 0.12);
            border-color: rgba(51, 255, 136, 0.5);
        }

        .touch-btn.wide {
            width: 80px;
            font-size: 9px;
            letter-spacing: 1px;
        }

        .touch-btn.drop-btn {
            width: 100%;
            height: 48px;
            font-size: 10px;
            letter-spacing: 2px;
            border-color: rgba(255, 136, 17, 0.3);
            color: var(--neon-orange);
            text-shadow: 0 0 6px rgba(255, 136, 17, 0.4);
        }

        .touch-btn.drop-btn:active, .touch-btn.drop-btn.active {
            background: rgba(255, 136, 17, 0.12);
            border-color: rgba(255, 136, 17, 0.5);
        }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 700px), (max-height: 700px) and (pointer: coarse) {
            .touch-controls {
                display: block;
            }

            body {
                align-items: flex-start;
                overflow: auto;
            }

            .game-wrapper {
                flex-direction: column;
                align-items: center;
                gap: 8px;
                padding: 8px;
                border-radius: 8px;
                margin-top: 4px;
                margin-bottom: 220px;
            }

            .left-panel, .right-panel {
                width: 100%;
                flex-direction: row;
                gap: 8px;
            }

            .left-panel .controls-box {
                display: none;
            }

            .left-panel .panel-box,
            .right-panel .panel-box {
                flex: 1;
                padding: 8px;
            }

            .left-panel .panel-box canvas,
            .right-panel .panel-box canvas {
                width: 60px;
                height: 60px;
            }

            .panel-label {
                font-size: 6px;
                margin-bottom: 4px;
            }

            .stat-label {
                font-size: 6px;
            }

            .stat-val {
                font-size: 14px;
            }

            .level-big {
                font-size: 24px;
                padding: 4px 0;
            }

            .lines-detail {
                font-size: 6px;
            }

            .score-bar {
                padding-bottom: 6px;
            }

            .score-label {
                font-size: 7px;
            }

            .score-value {
                font-size: 16px;
            }

            .center-column {
                order: -1;
            }

            .board-frame {
                max-width: min(300px, calc(100vw - 40px));
            }

            .game-board {
                width: 100%;
                height: auto;
            }

            .game-title {
                font-size: 28px;
                margin-bottom: 24px;
                letter-spacing: 6px;
            }

            .screen-title {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .level-buttons {
                grid-template-columns: repeat(5, 40px);
                gap: 6px;
            }

            .level-btn {
                width: 40px;
                height: 40px;
                font-size: 10px;
            }

            .start-btn {
                padding: 12px 28px;
                font-size: 12px;
            }
        }

        @media (pointer: coarse) {
            .touch-controls {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="crt-scanlines"></div>
    <div class="vignette"></div>

    <!-- Start Screen -->
    <div class="start-screen" id="startScreen">
        <h1 class="game-title">
            <span style="--glow: #cc22ff; --i: 0">T</span><span style="--glow: #00ffff; --i: 1">E</span><span style="--glow: #ff8811; --i: 2">T</span><span style="--glow: #ff2244; --i: 3">R</span><span style="--glow: #00ff44; --i: 4">I</span><span style="--glow: #ffee00; --i: 5">S</span>
        </h1>
        <div class="level-select">
            <h2>SELECT LEVEL</h2>
            <div class="level-buttons" id="levelButtons"></div>
        </div>
        <button class="start-btn" id="startBtn">INSERT COIN</button>
    </div>

    <!-- Game Over Screen -->
    <div class="game-over-screen hidden" id="gameOverScreen">
        <h1 class="screen-title game-over-title">GAME OVER</h1>
        <div class="final-score">SCORE <span id="finalScore">0</span></div>
        <div class="final-score">LEVEL <span id="finalLevel">1</span></div>
        <button class="start-btn" id="restartBtn">CONTINUE?</button>
    </div>

    <!-- Victory Screen -->
    <div class="victory-screen hidden" id="victoryScreen">
        <h1 class="screen-title victory-title">VICTORY</h1>
        <div class="final-score">SCORE <span id="victoryScore">0</span></div>
        <div class="final-score">ALL 20 LEVELS CLEARED!</div>
        <button class="start-btn" id="victoryRestartBtn">PLAY AGAIN</button>
    </div>

    <!-- Pause Overlay -->
    <div class="paused-overlay hidden" id="pausedOverlay">PAUSED</div>

    <!-- Popup Container -->
    <div class="popup-container" id="popupContainer"></div>

    <!-- 3-Column Game Layout -->
    <div class="game-wrapper">
        <!-- Left Panel: Hold, Stats, Controls -->
        <div class="left-panel">
            <div class="panel-box">
                <div class="panel-label">HOLD</div>
                <canvas id="holdPiece" class="piece-canvas" width="120" height="120"></canvas>
            </div>
            <div class="panel-box stats-box">
                <div class="stat-row">
                    <span class="stat-label">LEVEL</span>
                    <span class="stat-val" id="levelDisplay">1</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">LINES</span>
                    <span class="stat-val" id="lines">0</span>
                </div>
                <div class="lines-detail" id="linesDetail"></div>
            </div>
            <div class="panel-box controls-box">
                <div class="panel-label">CONTROLS</div>
                <div class="controls">
                    <div><kbd>&larr;</kbd> <kbd>&rarr;</kbd> MOVE</div>
                    <div><kbd>&darr;</kbd> SOFT DROP</div>
                    <div><kbd>&uarr;</kbd> ROTATE</div>
                    <div><kbd>SPC</kbd> HARD DROP</div>
                    <div><kbd>C</kbd> HOLD</div>
                    <div><kbd>P</kbd> PAUSE</div>
                </div>
            </div>
        </div>

        <!-- Center: Score + Board -->
        <div class="center-column">
            <div class="score-bar">
                <span class="score-label">SCORE</span>
                <span class="score-value" id="score">0</span>
            </div>
            <div class="board-frame">
                <canvas id="gameBoard" class="game-board" width="300" height="600"></canvas>
            </div>
        </div>

        <!-- Right Panel: Next + Level -->
        <div class="right-panel">
            <div class="panel-box">
                <div class="panel-label">NEXT</div>
                <canvas id="nextPiece" class="piece-canvas" width="120" height="120"></canvas>
            </div>
        </div>
    </div>

    <!-- Touch Controls -->
    <div class="touch-controls" id="touchControls">
        <div class="touch-row">
            <div class="touch-row-left">
                <button class="touch-btn" id="btnLeft">&larr;</button>
                <button class="touch-btn" id="btnRight">&rarr;</button>
            </div>
            <div class="touch-row-right">
                <button class="touch-btn" id="btnRotate">&uarr;</button>
                <button class="touch-btn wide" id="btnHold">HOLD</button>
            </div>
        </div>
        <div class="touch-row">
            <div class="touch-row-left">
                <button class="touch-btn" id="btnDown">&darr;</button>
                <button class="touch-btn wide" id="btnPause">PAUSE</button>
            </div>
            <div class="touch-row-right">
                <button class="touch-btn drop-btn" id="btnDrop">DROP</button>
            </div>
        </div>
    </div>

    <script>
        // ========== CONSTANTS ==========
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;
        const BG_COLOR = '#06060c';

        const COLORS = [
            null,
            '#00ffff', // I - Cyan
            '#4466ff', // J - Blue
            '#ff8811', // L - Orange
            '#ffee00', // O - Yellow
            '#00ff44', // S - Green
            '#cc22ff', // T - Purple
            '#ff2244'  // Z - Red
        ];

        const SHAPES = [
            null,
            [[1, 1, 1, 1]],                           // I
            [[2, 0, 0], [2, 2, 2]],                   // J
            [[0, 0, 3], [3, 3, 3]],                   // L
            [[4, 4], [4, 4]],                         // O
            [[0, 5, 5], [5, 5, 0]],                   // S
            [[0, 6, 0], [6, 6, 6]],                   // T
            [[7, 7, 0], [0, 7, 7]]                    // Z
        ];

        const LEVEL_SPEEDS = [
            800, 700, 600, 500, 400, 300, 200, 150, 100, 80,
            65, 50, 40, 30, 20, 15, 10, 8, 5, 3
        ];

        const LINES_PER_LEVEL = 10;
        const MAX_LEVEL = 20;
        const VICTORY_LINES_AT_20 = 10;

        const BASE_LOCK_DELAY = 500;
        const MAX_LOCK_RESETS = 15;

        // ========== AUDIO ==========
        let audioCtx = null;

        function getAudioCtx() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function playSound(type) {
            try {
                const ctx = getAudioCtx();
                const now = ctx.currentTime;

                switch (type) {
                    case 'move': {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'square';
                        osc.frequency.value = 200;
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                        osc.connect(gain).connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.08);
                        break;
                    }
                    case 'rotate': {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'square';
                        osc.frequency.value = 300;
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                        osc.connect(gain).connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.08);
                        break;
                    }
                    case 'hardDrop': {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.value = 100;
                        gain.gain.setValueAtTime(0.15, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                        osc.connect(gain).connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.15);
                        break;
                    }
                    case 'lineClear': {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(200, now);
                        osc.frequency.exponentialRampToValueAtTime(800, now + 0.2);
                        gain.gain.setValueAtTime(0.15, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                        osc.connect(gain).connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.2);
                        break;
                    }
                    case 'tetris': {
                        const osc1 = ctx.createOscillator();
                        const osc2 = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc1.type = 'sine';
                        osc2.type = 'sine';
                        osc1.frequency.setValueAtTime(200, now);
                        osc1.frequency.exponentialRampToValueAtTime(1000, now + 0.3);
                        osc2.frequency.setValueAtTime(300, now);
                        osc2.frequency.exponentialRampToValueAtTime(1200, now + 0.3);
                        gain.gain.setValueAtTime(0.12, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
                        osc1.connect(gain);
                        osc2.connect(gain);
                        gain.connect(ctx.destination);
                        osc1.start(now);
                        osc2.start(now);
                        osc1.stop(now + 0.35);
                        osc2.stop(now + 0.35);
                        break;
                    }
                    case 'tSpin': {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(400, now);
                        osc.frequency.setValueAtTime(600, now + 0.08);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                        osc.connect(gain).connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.15);
                        break;
                    }
                    case 'levelUp': {
                        [400, 500, 600].forEach((freq, i) => {
                            const osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            osc.type = 'sine';
                            osc.frequency.value = freq;
                            gain.gain.setValueAtTime(0.12, now + i * 0.1);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.15);
                            osc.connect(gain).connect(ctx.destination);
                            osc.start(now + i * 0.1);
                            osc.stop(now + i * 0.1 + 0.15);
                        });
                        break;
                    }
                    case 'gameOver': {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(400, now);
                        osc.frequency.exponentialRampToValueAtTime(80, now + 0.6);
                        gain.gain.setValueAtTime(0.12, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
                        osc.connect(gain).connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.6);
                        break;
                    }
                    case 'combo': {
                        const freq = 300 + comboCount * 80;
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = Math.min(freq, 1200);
                        gain.gain.setValueAtTime(0.12, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                        osc.connect(gain).connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.12);
                        break;
                    }
                    case 'hold': {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = 250;
                        gain.gain.setValueAtTime(0.08, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                        osc.connect(gain).connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.1);
                        break;
                    }
                    case 'victory': {
                        [500, 600, 700, 800, 1000].forEach((freq, i) => {
                            const osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            osc.type = 'sine';
                            osc.frequency.value = freq;
                            gain.gain.setValueAtTime(0.12, now + i * 0.12);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.2);
                            osc.connect(gain).connect(ctx.destination);
                            osc.start(now + i * 0.12);
                            osc.stop(now + i * 0.12 + 0.2);
                        });
                        break;
                    }
                }
            } catch (e) {}
        }

        // ========== GAME STATE ==========
        let canvas, ctx, nextCanvas, nextCtx, holdCanvas, holdCtx;
        let board, currentPiece, nextPiece;
        let score, lines, level, startLevel;
        let gameLoop, isPaused, isGameOver;
        let lastTime, dropCounter, dropInterval;
        let holdPiece, hasHeld;
        let isLocking, lockTimer, lockResets;
        let clearingRows, clearAnimTimer, clearAnimPhase;
        let comboCount, lastClearWasSpecial;
        let blockPlaceTime;
        let linesAtLevel20;
        let lastMoveWasRotation;
        let pieceBag;

        // ========== 7-BAG RANDOMIZER ==========
        function shuffleBag() {
            const bag = [1, 2, 3, 4, 5, 6, 7];
            for (let i = bag.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [bag[i], bag[j]] = [bag[j], bag[i]];
            }
            return bag;
        }

        function nextPieceType() {
            if (!pieceBag || pieceBag.length === 0) {
                pieceBag = shuffleBag();
            }
            return pieceBag.pop();
        }

        // ========== SCREEN SHAKE ==========
        function screenShake() {
            const frame = document.querySelector('.board-frame');
            frame.style.transform = 'translate(2px, 4px)';
            setTimeout(() => { frame.style.transform = 'translate(-2px, -2px)'; }, 35);
            setTimeout(() => { frame.style.transform = 'translate(1px, 1px)'; }, 70);
            setTimeout(() => { frame.style.transform = ''; }, 105);
        }

        // ========== POPUP SYSTEM ==========
        function showPopup(text, className) {
            const container = document.getElementById('popupContainer');
            const popup = document.createElement('div');
            popup.className = 'popup ' + className;
            popup.textContent = text;
            container.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        // ========== INIT ==========
        function init() {
            canvas = document.getElementById('gameBoard');
            ctx = canvas.getContext('2d');
            nextCanvas = document.getElementById('nextPiece');
            nextCtx = nextCanvas.getContext('2d');
            holdCanvas = document.getElementById('holdPiece');
            holdCtx = holdCanvas.getContext('2d');

            createLevelButtons();

            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('restartBtn').addEventListener('click', returnToStart);
            document.getElementById('victoryRestartBtn').addEventListener('click', returnToStart);

            document.addEventListener('keydown', handleKeyPress);

            holdCtx.fillStyle = BG_COLOR;
            holdCtx.fillRect(0, 0, holdCanvas.width, holdCanvas.height);
        }

        function returnToStart() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('victoryScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
        }

        function createLevelButtons() {
            const container = document.getElementById('levelButtons');
            for (let i = 1; i <= MAX_LEVEL; i++) {
                const btn = document.createElement('button');
                btn.className = 'level-btn' + (i === 1 ? ' selected' : '');
                btn.textContent = i;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    startLevel = i;
                });
                container.appendChild(btn);
            }
            startLevel = 1;
        }

        function updateLevelDisplay() {
            document.getElementById('levelDisplay').textContent = level;
        }

        // ========== GAME START ==========
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');

            board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
            blockPlaceTime = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
            score = 0;
            lines = 0;
            level = startLevel;
            isPaused = false;
            isGameOver = false;
            dropCounter = 0;
            dropInterval = LEVEL_SPEEDS[level - 1];
            holdPiece = null;
            hasHeld = false;
            isLocking = false;
            lockTimer = 0;
            lockResets = 0;
            clearingRows = null;
            clearAnimTimer = 0;
            clearAnimPhase = 0;
            comboCount = -1;
            lastClearWasSpecial = false;
            linesAtLevel20 = 0;
            lastMoveWasRotation = false;
            pieceBag = [];

            updateScore();
            updateLines();
            updateLevelDisplay();

            holdCtx.fillStyle = BG_COLOR;
            holdCtx.fillRect(0, 0, holdCanvas.width, holdCanvas.height);

            nextPiece = createPiece();
            spawnPiece();

            lastTime = performance.now();
            gameLoop = requestAnimationFrame(update);
        }

        // ========== PIECE CREATION ==========
        function createPiece() {
            const type = nextPieceType();
            return {
                shape: SHAPES[type].map(row => [...row]),
                color: type,
                x: 0,
                y: 0
            };
        }

        function spawnPiece() {
            currentPiece = nextPiece;
            nextPiece = createPiece();
            currentPiece.x = Math.floor(COLS / 2) - Math.floor(currentPiece.shape[0].length / 2);
            currentPiece.y = 0;
            hasHeld = false;
            isLocking = false;
            lockTimer = 0;
            lockResets = 0;
            lastMoveWasRotation = false;

            if (collision()) {
                gameOver();
            }

            drawNextPiece();
        }

        // ========== HOLD PIECE ==========
        function holdCurrentPiece() {
            if (hasHeld) return;
            hasHeld = true;
            playSound('hold');

            if (holdPiece === null) {
                holdPiece = {
                    shape: SHAPES[currentPiece.color].map(row => [...row]),
                    color: currentPiece.color
                };
                spawnPiece();
            } else {
                const temp = {
                    shape: SHAPES[currentPiece.color].map(row => [...row]),
                    color: currentPiece.color
                };
                currentPiece = {
                    shape: holdPiece.shape.map(row => [...row]),
                    color: holdPiece.color,
                    x: Math.floor(COLS / 2) - Math.floor(holdPiece.shape[0].length / 2),
                    y: 0
                };
                holdPiece = temp;
                isLocking = false;
                lockTimer = 0;
                lockResets = 0;
                lastMoveWasRotation = false;

                if (collision()) {
                    gameOver();
                }
            }

            drawHoldPiece();
        }

        function drawHoldPiece() {
            holdCtx.fillStyle = BG_COLOR;
            holdCtx.fillRect(0, 0, holdCanvas.width, holdCanvas.height);

            if (!holdPiece) return;

            const shape = holdPiece.shape;
            const blockSize = 25;
            const offsetX = (holdCanvas.width - shape[0].length * blockSize) / 2;
            const offsetY = (holdCanvas.height - shape.length * blockSize) / 2;

            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        drawPreviewBlock(holdCtx, offsetX + x * blockSize, offsetY + y * blockSize, blockSize, COLORS[holdPiece.color]);
                    }
                }
            }
        }

        // ========== COLLISION ==========
        function collision(offsetX = 0, offsetY = 0, shape = currentPiece.shape) {
            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        const newX = currentPiece.x + x + offsetX;
                        const newY = currentPiece.y + y + offsetY;
                        if (newX < 0 || newX >= COLS || newY >= ROWS) return true;
                        if (newY >= 0 && board[newY][newX]) return true;
                    }
                }
            }
            return false;
        }

        // ========== MERGE ==========
        function merge() {
            const now = performance.now();
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        const boardY = currentPiece.y + y;
                        if (boardY >= 0) {
                            board[boardY][currentPiece.x + x] = currentPiece.color;
                            blockPlaceTime[boardY][currentPiece.x + x] = now;
                        }
                    }
                }
            }
        }

        // ========== T-SPIN DETECTION ==========
        function isTSpin() {
            if (currentPiece.color !== 6) return false;
            if (!lastMoveWasRotation) return false;

            const shape = currentPiece.shape;
            let centerX = -1, centerY = -1;

            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        let adj = 0;
                        if (y > 0 && x < shape[y-1].length && shape[y-1][x]) adj++;
                        if (y < shape.length - 1 && x < shape[y+1].length && shape[y+1][x]) adj++;
                        if (x > 0 && shape[y][x-1]) adj++;
                        if (x < shape[y].length - 1 && shape[y][x+1]) adj++;
                        if (adj >= 2) { centerX = currentPiece.x + x; centerY = currentPiece.y + y; break; }
                    }
                }
                if (centerX !== -1) break;
            }

            if (centerX === -1) return false;

            let filledCorners = 0;
            const corners = [[-1,-1], [1,-1], [-1,1], [1,1]];
            for (const [dx, dy] of corners) {
                const cx = centerX + dx;
                const cy = centerY + dy;
                if (cx < 0 || cx >= COLS || cy < 0 || cy >= ROWS || (cy >= 0 && board[cy][cx])) filledCorners++;
            }
            return filledCorners >= 3;
        }

        // ========== ROTATION ==========
        function rotate() {
            const shape = currentPiece.shape;
            const rows = shape.length;
            const cols = shape[0].length;
            const rotated = Array(cols).fill(null).map(() => Array(rows).fill(0));

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    rotated[x][rows - 1 - y] = shape[y][x];
                }
            }

            const kicks = [0, -1, 1, -2, 2];
            for (const kick of kicks) {
                if (!collision(kick, 0, rotated)) {
                    currentPiece.x += kick;
                    currentPiece.shape = rotated;
                    lastMoveWasRotation = true;
                    playSound('rotate');
                    if (isLocking && lockResets < MAX_LOCK_RESETS) { lockTimer = 0; lockResets++; }
                    return;
                }
            }
        }

        // ========== LINE CLEARING ==========
        function findFullRows() {
            const fullRows = [];
            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) fullRows.push(y);
            }
            return fullRows;
        }

        function startLineClearAnimation(rows) {
            clearingRows = rows;
            clearAnimTimer = 0;
            clearAnimPhase = 0;
        }

        function processLineClear() {
            const linesCleared = clearingRows.length;
            const wasTSpin = isTSpinForClear;

            for (const row of clearingRows.sort((a, b) => b - a)) {
                board.splice(row, 1);
                board.unshift(Array(COLS).fill(0));
                blockPlaceTime.splice(row, 1);
                blockPlaceTime.unshift(Array(COLS).fill(0));
            }

            let points = 0;
            let isSpecialClear = false;

            if (wasTSpin) {
                playSound('tSpin');
                const tSpinPoints = [0, 800, 1200, 1600];
                points = tSpinPoints[Math.min(linesCleared, 3)] * level;
                const labels = ['', 'T-SPIN SINGLE!', 'T-SPIN DOUBLE!', 'T-SPIN TRIPLE!'];
                showPopup(labels[Math.min(linesCleared, 3)], 'tspin');
                isSpecialClear = true;
            } else if (linesCleared === 4) {
                points = 800 * level;
                playSound('tetris');
                showPopup('TETRIS!', 'tetris');
                isSpecialClear = true;
            } else {
                const basePoints = [0, 100, 300, 500, 800];
                points = basePoints[linesCleared] * level;
                if (linesCleared > 0) playSound('lineClear');
            }

            if (isSpecialClear && lastClearWasSpecial) {
                points = Math.floor(points * 1.5);
                showPopup('BACK-TO-BACK!', 'b2b');
            }
            lastClearWasSpecial = isSpecialClear;

            comboCount++;
            if (comboCount > 0) {
                const comboBonus = 50 * comboCount * level;
                points += comboBonus;
                showPopup('COMBO x' + comboCount + '!', 'combo');
                playSound('combo');
            }

            score += points;
            lines += linesCleared;

            if (level === MAX_LEVEL) {
                linesAtLevel20 += linesCleared;
                if (linesAtLevel20 >= VICTORY_LINES_AT_20) { victory(); return; }
            }

            updateScore();
            updateLines();

            const newLevel = Math.min(MAX_LEVEL, startLevel + Math.floor(lines / LINES_PER_LEVEL));
            if (newLevel !== level) {
                const oldLevel = level;
                level = newLevel;
                dropInterval = LEVEL_SPEEDS[level - 1];
                updateLevelDisplay();
                playSound('levelUp');
                showPopup('LEVEL ' + level + '!', 'levelup');
                if (oldLevel < 5 && level >= 5) addGarbageRow();
            }

            clearingRows = null;
            clearAnimTimer = 0;
            clearAnimPhase = 0;
        }

        let isTSpinForClear = false;

        function clearLines() {
            const fullRows = findFullRows();
            if (fullRows.length > 0) {
                isTSpinForClear = isTSpin();
                startLineClearAnimation(fullRows);
            } else {
                comboCount = -1;
                spawnPiece();
            }
        }

        // ========== GARBAGE ROWS ==========
        function addGarbageRow() {
            board.shift();
            blockPlaceTime.shift();
            const gap = Math.floor(Math.random() * COLS);
            const garbageRow = Array(COLS).fill(7);
            garbageRow[gap] = 0;
            board.push(garbageRow);
            const timesRow = Array(COLS).fill(performance.now());
            timesRow[gap] = 0;
            blockPlaceTime.push(timesRow);
        }

        // ========== MOVEMENT ==========
        function drop() {
            if (!collision(0, 1)) {
                currentPiece.y++;
                lastMoveWasRotation = false;
                if (isLocking) { isLocking = false; lockTimer = 0; }
            } else {
                if (!isLocking) { isLocking = true; lockTimer = 0; lockResets = 0; }
            }
            dropCounter = 0;
        }

        function lockPiece() {
            merge();
            isLocking = false;
            lockTimer = 0;
            lockResets = 0;
            clearLines();
        }

        function hardDrop() {
            while (!collision(0, 1)) { currentPiece.y++; score += 2; }
            updateScore();
            playSound('hardDrop');
            screenShake();
            merge();
            isLocking = false;
            lockTimer = 0;
            lockResets = 0;
            clearLines();
        }

        function move(dir) {
            if (!collision(dir, 0)) {
                currentPiece.x += dir;
                lastMoveWasRotation = false;
                playSound('move');
                if (isLocking && lockResets < MAX_LOCK_RESETS) { lockTimer = 0; lockResets++; }
            }
        }

        // ========== INPUT ==========
        function handleKeyPress(e) {
            if (isGameOver) return;
            if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
            if (isPaused) return;
            if (clearingRows) return;

            switch (e.key) {
                case 'ArrowLeft': move(-1); e.preventDefault(); break;
                case 'ArrowRight': move(1); e.preventDefault(); break;
                case 'ArrowDown': drop(); score += 1; updateScore(); e.preventDefault(); break;
                case 'ArrowUp': rotate(); e.preventDefault(); break;
                case ' ': hardDrop(); e.preventDefault(); break;
                case 'c': case 'C': case 'Shift': holdCurrentPiece(); break;
            }
        }

        // ========== PAUSE / GAME OVER / VICTORY ==========
        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pausedOverlay').classList.toggle('hidden', !isPaused);
            if (!isPaused) { lastTime = performance.now(); gameLoop = requestAnimationFrame(update); }
        }

        function gameOver() {
            isGameOver = true;
            cancelAnimationFrame(gameLoop);
            playSound('gameOver');
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLevel').textContent = level;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function victory() {
            isGameOver = true;
            cancelAnimationFrame(gameLoop);
            playSound('victory');
            document.getElementById('victoryScore').textContent = score;
            document.getElementById('victoryScreen').classList.remove('hidden');
        }

        function getLockDelay() {
            if (level >= 18) return 200;
            if (level >= 15) return 300;
            return BASE_LOCK_DELAY;
        }

        // ========== UPDATE LOOP ==========
        function update(time) {
            if (isPaused || isGameOver) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            if (clearingRows) {
                clearAnimTimer += deltaTime;
                clearAnimPhase = Math.floor(clearAnimTimer / 66);
                if (clearAnimTimer >= 400) {
                    processLineClear();
                    if (!isGameOver && !clearingRows) spawnPiece();
                }
                draw();
                gameLoop = requestAnimationFrame(update);
                return;
            }

            if (isLocking) {
                lockTimer += deltaTime;
                if (lockTimer >= getLockDelay()) {
                    lockPiece();
                    draw();
                    gameLoop = requestAnimationFrame(update);
                    return;
                }
                if (!collision(0, 1)) { isLocking = false; lockTimer = 0; }
            }

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) drop();

            draw();
            gameLoop = requestAnimationFrame(update);
        }

        // ========== DRAWING ==========
        function draw() {
            ctx.fillStyle = BG_COLOR;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Faint grid dots at intersections
            ctx.fillStyle = '#0e0e1a';
            for (let x = 1; x < COLS; x++) {
                for (let y = 1; y < ROWS; y++) {
                    ctx.fillRect(x * BLOCK_SIZE - 0.5, y * BLOCK_SIZE - 0.5, 1, 1);
                }
            }

            // Ultra-faint grid lines
            ctx.strokeStyle = '#0a0a16';
            ctx.lineWidth = 0.5;
            for (let x = 1; x < COLS; x++) {
                ctx.beginPath();
                ctx.moveTo(x * BLOCK_SIZE, 0);
                ctx.lineTo(x * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let y = 1; y < ROWS; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * BLOCK_SIZE);
                ctx.lineTo(canvas.width, y * BLOCK_SIZE);
                ctx.stroke();
            }

            const now = performance.now();

            // Board blocks
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x]) {
                        if (clearingRows && clearingRows.includes(y)) {
                            if (clearAnimPhase % 2 === 1) drawBlock(ctx, x, y, '#ffffff');
                            else drawBlock(ctx, x, y, COLORS[board[y][x]]);
                            continue;
                        }

                        let alpha = 1;
                        const placeAge = now - blockPlaceTime[y][x];
                        if (level >= 20 && blockPlaceTime[y][x] > 0 && placeAge > 1000) alpha = 0;
                        else if (level >= 15 && blockPlaceTime[y][x] > 0 && placeAge > 2000) alpha = 0.5;

                        if (alpha > 0) {
                            ctx.globalAlpha = alpha;
                            drawBlock(ctx, x, y, COLORS[board[y][x]]);
                            ctx.globalAlpha = 1;
                        }
                    }
                }
            }

            if (!clearingRows && currentPiece) {
                // Ghost piece
                let ghostY = currentPiece.y;
                while (!collision(0, ghostY - currentPiece.y + 1)) ghostY++;
                for (let y = 0; y < currentPiece.shape.length; y++) {
                    for (let x = 0; x < currentPiece.shape[y].length; x++) {
                        if (currentPiece.shape[y][x]) drawGhostBlock(ctx, currentPiece.x + x, ghostY + y, COLORS[currentPiece.color]);
                    }
                }

                // Current piece
                for (let y = 0; y < currentPiece.shape.length; y++) {
                    for (let x = 0; x < currentPiece.shape[y].length; x++) {
                        if (currentPiece.shape[y][x]) drawBlock(ctx, currentPiece.x + x, currentPiece.y + y, COLORS[currentPiece.color]);
                    }
                }
            }
        }

        function drawBlock(context, x, y, color) {
            const px = x * BLOCK_SIZE;
            const py = y * BLOCK_SIZE;
            const size = BLOCK_SIZE;
            const inset = 1;

            context.save();
            context.shadowColor = color;
            context.shadowBlur = 10;
            context.fillStyle = color;
            context.fillRect(px + inset, py + inset, size - inset * 2, size - inset * 2);

            context.shadowBlur = 0;
            context.fillStyle = 'rgba(255, 255, 255, 0.25)';
            context.fillRect(px + inset, py + inset, size - inset * 2, 3);
            context.fillRect(px + inset, py + inset, 3, size - inset * 2);

            context.fillStyle = 'rgba(0, 0, 0, 0.3)';
            context.fillRect(px + inset, py + size - inset - 3, size - inset * 2, 3);
            context.fillRect(px + size - inset - 3, py + inset, 3, size - inset * 2);

            context.fillStyle = 'rgba(255, 255, 255, 0.08)';
            context.fillRect(px + 5, py + 5, size - 10, size - 10);
            context.restore();
        }

        function drawGhostBlock(context, x, y, color) {
            const px = x * BLOCK_SIZE;
            const py = y * BLOCK_SIZE;
            const size = BLOCK_SIZE;
            const inset = 2;

            context.save();
            context.strokeStyle = color;
            context.globalAlpha = 0.25;
            context.lineWidth = 1.5;
            context.setLineDash([4, 3]);
            context.strokeRect(px + inset, py + inset, size - inset * 2, size - inset * 2);
            context.setLineDash([]);
            context.globalAlpha = 1;
            context.restore();
        }

        function drawPreviewBlock(context, px, py, blockSize, color) {
            const inset = 2;
            context.save();
            context.shadowColor = color;
            context.shadowBlur = 8;
            context.fillStyle = color;
            context.fillRect(px + inset, py + inset, blockSize - inset * 2, blockSize - inset * 2);

            context.shadowBlur = 0;
            context.fillStyle = 'rgba(255, 255, 255, 0.2)';
            context.fillRect(px + inset, py + inset, blockSize - inset * 2, 2);
            context.fillRect(px + inset, py + inset, 2, blockSize - inset * 2);

            context.fillStyle = 'rgba(0, 0, 0, 0.25)';
            context.fillRect(px + inset, py + blockSize - inset - 2, blockSize - inset * 2, 2);
            context.fillRect(px + blockSize - inset - 2, py + inset, 2, blockSize - inset * 2);
            context.restore();
        }

        function drawNextPiece() {
            nextCtx.fillStyle = BG_COLOR;
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

            const shape = nextPiece.shape;
            const blockSize = 25;
            const offsetX = (nextCanvas.width - shape[0].length * blockSize) / 2;
            const offsetY = (nextCanvas.height - shape.length * blockSize) / 2;

            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        drawPreviewBlock(nextCtx, offsetX + x * blockSize, offsetY + y * blockSize, blockSize, COLORS[nextPiece.color]);
                    }
                }
            }
        }

        // ========== UI UPDATES ==========
        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function updateLines() {
            document.getElementById('lines').textContent = lines;
            const linesInCurrentLevel = lines % LINES_PER_LEVEL;
            const toNext = LINES_PER_LEVEL - linesInCurrentLevel;
            if (level < MAX_LEVEL) {
                document.getElementById('linesDetail').textContent = toNext + ' TO NEXT';
            } else {
                document.getElementById('linesDetail').textContent = linesAtLevel20 + '/' + VICTORY_LINES_AT_20 + ' TO VICTORY';
            }
        }

        // ========== TOUCH CONTROLS ==========
        function setupTouchControls() {
            const buttons = {
                btnLeft:   () => { if (!isPaused && !isGameOver && !clearingRows) move(-1); },
                btnRight:  () => { if (!isPaused && !isGameOver && !clearingRows) move(1); },
                btnDown:   () => { if (!isPaused && !isGameOver && !clearingRows) { drop(); score += 1; updateScore(); } },
                btnRotate: () => { if (!isPaused && !isGameOver && !clearingRows) rotate(); },
                btnDrop:   () => { if (!isPaused && !isGameOver && !clearingRows) hardDrop(); },
                btnHold:   () => { if (!isPaused && !isGameOver && !clearingRows) holdCurrentPiece(); },
                btnPause:  () => { if (!isGameOver) togglePause(); }
            };

            // Auto-repeat for directional buttons
            const repeatButtons = ['btnLeft', 'btnRight', 'btnDown'];
            const repeatDelay = 170;
            const repeatRate = 50;
            let repeatTimers = {};

            for (const [id, action] of Object.entries(buttons)) {
                const el = document.getElementById(id);
                if (!el) continue;

                const startAction = (e) => {
                    e.preventDefault();
                    el.classList.add('active');
                    action();

                    // Setup auto-repeat for movement buttons
                    if (repeatButtons.includes(id)) {
                        clearTimeout(repeatTimers[id + '_delay']);
                        clearInterval(repeatTimers[id + '_repeat']);
                        repeatTimers[id + '_delay'] = setTimeout(() => {
                            repeatTimers[id + '_repeat'] = setInterval(action, repeatRate);
                        }, repeatDelay);
                    }
                };

                const endAction = (e) => {
                    e.preventDefault();
                    el.classList.remove('active');
                    clearTimeout(repeatTimers[id + '_delay']);
                    clearInterval(repeatTimers[id + '_repeat']);
                };

                el.addEventListener('touchstart', startAction, { passive: false });
                el.addEventListener('touchend', endAction, { passive: false });
                el.addEventListener('touchcancel', endAction, { passive: false });
            }

            // Prevent double-tap zoom on touch controls area
            document.getElementById('touchControls').addEventListener('touchstart', (e) => {
                e.preventDefault();
            }, { passive: false });
        }

        // ========== SWIPE GESTURES ON BOARD ==========
        function setupSwipeGestures() {
            const boardFrame = document.querySelector('.board-frame');
            let touchStartX, touchStartY, touchStartTime;
            let lastTapTime = 0;

            boardFrame.addEventListener('touchstart', (e) => {
                if (isPaused || isGameOver || clearingRows) return;
                const touch = e.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
                touchStartTime = Date.now();
                e.preventDefault();
            }, { passive: false });

            boardFrame.addEventListener('touchend', (e) => {
                if (isPaused || isGameOver || clearingRows) return;
                const touch = e.changedTouches[0];
                const dx = touch.clientX - touchStartX;
                const dy = touch.clientY - touchStartY;
                const dt = Date.now() - touchStartTime;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // Tap to rotate (short touch, little movement)
                if (dist < 20 && dt < 250) {
                    const now = Date.now();
                    if (now - lastTapTime < 300) {
                        // Double tap = hard drop
                        hardDrop();
                    } else {
                        rotate();
                    }
                    lastTapTime = now;
                }
                // Swipe down = hard drop
                else if (dy > 60 && Math.abs(dx) < dy * 0.6 && dt < 400) {
                    hardDrop();
                }
                // Swipe left
                else if (dx < -30 && Math.abs(dy) < Math.abs(dx) * 0.7) {
                    move(-1);
                }
                // Swipe right
                else if (dx > 30 && Math.abs(dy) < Math.abs(dx) * 0.7) {
                    move(1);
                }

                e.preventDefault();
            }, { passive: false });

            // Prevent scrolling on the game area
            boardFrame.addEventListener('touchmove', (e) => {
                e.preventDefault();
            }, { passive: false });
        }

        // Prevent pull-to-refresh and bounce scrolling during gameplay
        document.addEventListener('touchmove', (e) => {
            if (!isGameOver && document.getElementById('startScreen').classList.contains('hidden')) {
                e.preventDefault();
            }
        }, { passive: false });

        // ========== START ==========
        init();
        setupTouchControls();
        setupSwipeGestures();
    </script>
</body>
</html>
