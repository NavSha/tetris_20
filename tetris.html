<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris - 20 Difficulty Levels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        .game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .game-board {
            border: 4px solid #4a4a6a;
            border-radius: 8px;
            background: #0a0a1a;
            box-shadow: 0 0 30px rgba(100, 100, 255, 0.3);
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 150px;
        }

        .panel-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(10px);
        }

        .panel-box h3 {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .panel-box .value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        .next-piece-canvas, .hold-piece-canvas {
            background: #0a0a1a;
            border-radius: 4px;
        }

        .controls {
            font-size: 12px;
            line-height: 1.8;
            color: #888;
        }

        .controls span {
            color: #fff;
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }

        .start-screen, .game-over-screen, .victory-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .start-screen h1, .game-over-screen h1, .victory-screen h1 {
            font-size: 48px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .victory-screen h1 {
            background: linear-gradient(135deg, #f0d000 0%, #ff6600 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .level-select {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .level-select h2 {
            font-size: 18px;
            color: #888;
        }

        .level-buttons {
            display: grid;
            grid-template-columns: repeat(5, 50px);
            gap: 10px;
            justify-content: center;
        }

        .level-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 8px;
            background: #333;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .level-btn:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transform: scale(1.1);
        }

        .level-btn.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .start-btn {
            padding: 15px 50px;
            font-size: 20px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }

        .game-over-screen .final-score,
        .victory-screen .final-score {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }

        .paused-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            font-size: 48px;
        }

        .popup-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 40;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .popup {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
            animation: popupAnim 1s ease-out forwards;
            text-shadow: 0 0 10px currentColor;
        }

        @keyframes popupAnim {
            0% { opacity: 1; transform: scale(1.5); }
            30% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.8) translateY(-30px); }
        }

        .popup.combo { color: #00f0f0; }
        .popup.tspin { color: #a000f0; }
        .popup.b2b { color: #f0d000; }
        .popup.levelup { color: #00f000; }
        .popup.tetris { color: #ff6600; }

        .level-display {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            color: #fff;
        }

        .lines-detail {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="start-screen" id="startScreen">
        <h1>TETRIS</h1>
        <div class="level-select">
            <h2>Select Starting Level</h2>
            <div class="level-buttons" id="levelButtons"></div>
        </div>
        <button class="start-btn" id="startBtn">START GAME</button>
    </div>

    <div class="game-over-screen hidden" id="gameOverScreen">
        <h1>GAME OVER</h1>
        <div class="final-score">Score: <span id="finalScore">0</span></div>
        <div class="final-score">Level: <span id="finalLevel">1</span></div>
        <button class="start-btn" id="restartBtn">PLAY AGAIN</button>
    </div>

    <div class="victory-screen hidden" id="victoryScreen">
        <h1>YOU WIN!</h1>
        <div class="final-score">Score: <span id="victoryScore">0</span></div>
        <div class="final-score">All 20 levels conquered!</div>
        <button class="start-btn" id="victoryRestartBtn">PLAY AGAIN</button>
    </div>

    <div class="paused-overlay hidden" id="pausedOverlay">PAUSED</div>
    <div class="popup-container" id="popupContainer"></div>

    <div class="game-container">
        <div class="left-panel">
            <canvas id="gameBoard" class="game-board" width="300" height="600"></canvas>
        </div>
        <div class="right-panel">
            <div class="panel-box">
                <h3>Hold</h3>
                <canvas id="holdPiece" class="hold-piece-canvas" width="120" height="120"></canvas>
            </div>
            <div class="panel-box">
                <h3>Next</h3>
                <canvas id="nextPiece" class="next-piece-canvas" width="120" height="120"></canvas>
            </div>
            <div class="panel-box">
                <h3>Score</h3>
                <div class="value" id="score">0</div>
            </div>
            <div class="panel-box">
                <h3>Lines</h3>
                <div class="value" id="lines">0</div>
                <div class="lines-detail" id="linesDetail"></div>
            </div>
            <div class="panel-box">
                <h3>Level</h3>
                <div class="level-display" id="levelDisplay">1</div>
            </div>
            <div class="panel-box">
                <h3>Controls</h3>
                <div class="controls">
                    <span>&larr;</span> <span>&rarr;</span> Move<br>
                    <span>&darr;</span> Soft Drop<br>
                    <span>&uarr;</span> Rotate<br>
                    <span>Space</span> Hard Drop<br>
                    <span>C</span> Hold<br>
                    <span>P</span> Pause
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== CONSTANTS ==========
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;
        const COLORS = [
            null,
            '#00f0f0', // I - Cyan
            '#0000f0', // J - Blue
            '#f0a000', // L - Orange
            '#f0f000', // O - Yellow
            '#00f000', // S - Green
            '#a000f0', // T - Purple
            '#f00000'  // Z - Red
        ];

        const SHAPES = [
            null,
            [[1, 1, 1, 1]],                           // I
            [[2, 0, 0], [2, 2, 2]],                   // J
            [[0, 0, 3], [3, 3, 3]],                   // L
            [[4, 4], [4, 4]],                         // O
            [[0, 5, 5], [5, 5, 0]],                   // S
            [[0, 6, 0], [6, 6, 6]],                   // T
            [[7, 7, 0], [0, 7, 7]]                    // Z
        ];

        // Speed in ms per drop
        const LEVEL_SPEEDS = [
            800,  // Level 1
            700,  // Level 2
            600,  // Level 3
            500,  // Level 4
            400,  // Level 5
            300,  // Level 6
            200,  // Level 7
            150,  // Level 8
            100,  // Level 9
            80,   // Level 10
            65,   // Level 11
            50,   // Level 12
            40,   // Level 13
            30,   // Level 14
            20,   // Level 15
            15,   // Level 16
            10,   // Level 17
            8,    // Level 18
            5,    // Level 19
            3     // Level 20
        ];

        const LINES_PER_LEVEL = 10;
        const MAX_LEVEL = 20;
        const VICTORY_LINES_AT_20 = 10; // lines needed at L20 to win

        // Lock delay constants
        const BASE_LOCK_DELAY = 500;
        const MAX_LOCK_RESETS = 15;

        // ========== AUDIO ==========
        let audioCtx = null;

        function getAudioCtx() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function playSound(type) {
            try {
                const ctx = getAudioCtx();
                const now = ctx.currentTime;

                switch (type) {
                    case 'move': {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'square';
                        osc.frequency.value = 200;
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                        osc.connect(gain).connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.08);
                        break;
                    }
                    case 'rotate': {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'square';
                        osc.frequency.value = 300;
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                        osc.connect(gain).connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.08);
                        break;
                    }
                    case 'hardDrop': {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.value = 100;
                        gain.gain.setValueAtTime(0.15, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                        osc.connect(gain).connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.15);
                        break;
                    }
                    case 'lineClear': {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(200, now);
                        osc.frequency.exponentialRampToValueAtTime(800, now + 0.2);
                        gain.gain.setValueAtTime(0.15, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                        osc.connect(gain).connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.2);
                        break;
                    }
                    case 'tetris': {
                        const osc1 = ctx.createOscillator();
                        const osc2 = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc1.type = 'sine';
                        osc2.type = 'sine';
                        osc1.frequency.setValueAtTime(200, now);
                        osc1.frequency.exponentialRampToValueAtTime(1000, now + 0.3);
                        osc2.frequency.setValueAtTime(300, now);
                        osc2.frequency.exponentialRampToValueAtTime(1200, now + 0.3);
                        gain.gain.setValueAtTime(0.12, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
                        osc1.connect(gain);
                        osc2.connect(gain);
                        gain.connect(ctx.destination);
                        osc1.start(now);
                        osc2.start(now);
                        osc1.stop(now + 0.35);
                        osc2.stop(now + 0.35);
                        break;
                    }
                    case 'tSpin': {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(400, now);
                        osc.frequency.setValueAtTime(600, now + 0.08);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                        osc.connect(gain).connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.15);
                        break;
                    }
                    case 'levelUp': {
                        [400, 500, 600].forEach((freq, i) => {
                            const osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            osc.type = 'sine';
                            osc.frequency.value = freq;
                            gain.gain.setValueAtTime(0.12, now + i * 0.1);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.15);
                            osc.connect(gain).connect(ctx.destination);
                            osc.start(now + i * 0.1);
                            osc.stop(now + i * 0.1 + 0.15);
                        });
                        break;
                    }
                    case 'gameOver': {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(400, now);
                        osc.frequency.exponentialRampToValueAtTime(80, now + 0.6);
                        gain.gain.setValueAtTime(0.12, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
                        osc.connect(gain).connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.6);
                        break;
                    }
                    case 'combo': {
                        const freq = 300 + comboCount * 80;
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = Math.min(freq, 1200);
                        gain.gain.setValueAtTime(0.12, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                        osc.connect(gain).connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.12);
                        break;
                    }
                    case 'hold': {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = 250;
                        gain.gain.setValueAtTime(0.08, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                        osc.connect(gain).connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.1);
                        break;
                    }
                    case 'victory': {
                        [500, 600, 700, 800, 1000].forEach((freq, i) => {
                            const osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            osc.type = 'sine';
                            osc.frequency.value = freq;
                            gain.gain.setValueAtTime(0.12, now + i * 0.12);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.2);
                            osc.connect(gain).connect(ctx.destination);
                            osc.start(now + i * 0.12);
                            osc.stop(now + i * 0.12 + 0.2);
                        });
                        break;
                    }
                }
            } catch (e) {
                // Audio not available, silently fail
            }
        }

        // ========== GAME STATE ==========
        let canvas, ctx, nextCanvas, nextCtx, holdCanvas, holdCtx;
        let board, currentPiece, nextPiece;
        let score, lines, level, startLevel;
        let gameLoop, isPaused, isGameOver;
        let lastTime, dropCounter, dropInterval;

        // Hold piece
        let holdPiece, hasHeld;

        // Lock delay
        let isLocking, lockTimer, lockResets;

        // Line clear animation
        let clearingRows, clearAnimTimer, clearAnimPhase;

        // Combo / T-spin / back-to-back
        let comboCount, lastClearWasSpecial;

        // Milestone: block placement times for fade/invisible effects
        let blockPlaceTime; // 2D array matching board, stores timestamp of placement

        // Victory tracking
        let linesAtLevel20;

        // Last rotation flag for T-spin detection
        let lastMoveWasRotation;

        // ========== POPUP SYSTEM ==========
        function showPopup(text, className) {
            const container = document.getElementById('popupContainer');
            const popup = document.createElement('div');
            popup.className = 'popup ' + className;
            popup.textContent = text;
            container.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        // ========== INIT ==========
        function init() {
            canvas = document.getElementById('gameBoard');
            ctx = canvas.getContext('2d');
            nextCanvas = document.getElementById('nextPiece');
            nextCtx = nextCanvas.getContext('2d');
            holdCanvas = document.getElementById('holdPiece');
            holdCtx = holdCanvas.getContext('2d');

            createLevelButtons();

            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('restartBtn').addEventListener('click', returnToStart);
            document.getElementById('victoryRestartBtn').addEventListener('click', returnToStart);

            document.addEventListener('keydown', handleKeyPress);

            // Draw empty hold canvas
            holdCtx.fillStyle = '#0a0a1a';
            holdCtx.fillRect(0, 0, holdCanvas.width, holdCanvas.height);
        }

        function returnToStart() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('victoryScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
        }

        function createLevelButtons() {
            const container = document.getElementById('levelButtons');
            for (let i = 1; i <= MAX_LEVEL; i++) {
                const btn = document.createElement('button');
                btn.className = 'level-btn' + (i === 1 ? ' selected' : '');
                btn.textContent = i;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    startLevel = i;
                });
                container.appendChild(btn);
            }
            startLevel = 1;
        }

        function updateLevelDisplay() {
            document.getElementById('levelDisplay').textContent = level;
        }

        // ========== GAME START ==========
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');

            board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
            blockPlaceTime = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
            score = 0;
            lines = 0;
            level = startLevel;
            isPaused = false;
            isGameOver = false;
            dropCounter = 0;
            dropInterval = LEVEL_SPEEDS[level - 1];

            // Hold
            holdPiece = null;
            hasHeld = false;

            // Lock delay
            isLocking = false;
            lockTimer = 0;
            lockResets = 0;

            // Line clear animation
            clearingRows = null;
            clearAnimTimer = 0;
            clearAnimPhase = 0;

            // Combo / scoring
            comboCount = -1;
            lastClearWasSpecial = false;

            // Victory
            linesAtLevel20 = 0;

            // Rotation tracking
            lastMoveWasRotation = false;

            updateScore();
            updateLines();
            updateLevelDisplay();

            // Clear hold display
            holdCtx.fillStyle = '#0a0a1a';
            holdCtx.fillRect(0, 0, holdCanvas.width, holdCanvas.height);

            nextPiece = createPiece();
            spawnPiece();

            lastTime = performance.now();
            gameLoop = requestAnimationFrame(update);
        }

        // ========== PIECE CREATION ==========
        function createPiece() {
            const type = Math.floor(Math.random() * 7) + 1;
            return {
                shape: SHAPES[type].map(row => [...row]),
                color: type,
                x: 0,
                y: 0
            };
        }

        function spawnPiece() {
            currentPiece = nextPiece;
            nextPiece = createPiece();

            currentPiece.x = Math.floor(COLS / 2) - Math.floor(currentPiece.shape[0].length / 2);
            currentPiece.y = 0;

            // Reset hold permission
            hasHeld = false;

            // Reset lock delay
            isLocking = false;
            lockTimer = 0;
            lockResets = 0;

            // Reset rotation tracking
            lastMoveWasRotation = false;

            if (collision()) {
                gameOver();
            }

            drawNextPiece();
        }

        // ========== HOLD PIECE ==========
        function holdCurrentPiece() {
            if (hasHeld) return;
            hasHeld = true;
            playSound('hold');

            if (holdPiece === null) {
                holdPiece = {
                    shape: SHAPES[currentPiece.color].map(row => [...row]),
                    color: currentPiece.color
                };
                spawnPiece();
            } else {
                const temp = {
                    shape: SHAPES[currentPiece.color].map(row => [...row]),
                    color: currentPiece.color
                };
                // Restore hold piece as current
                currentPiece = {
                    shape: holdPiece.shape.map(row => [...row]),
                    color: holdPiece.color,
                    x: Math.floor(COLS / 2) - Math.floor(holdPiece.shape[0].length / 2),
                    y: 0
                };
                holdPiece = temp;

                // Reset lock delay
                isLocking = false;
                lockTimer = 0;
                lockResets = 0;
                lastMoveWasRotation = false;

                if (collision()) {
                    gameOver();
                }
            }

            drawHoldPiece();
        }

        function drawHoldPiece() {
            holdCtx.fillStyle = '#0a0a1a';
            holdCtx.fillRect(0, 0, holdCanvas.width, holdCanvas.height);

            if (!holdPiece) return;

            const shape = holdPiece.shape;
            const blockSize = 25;
            const offsetX = (holdCanvas.width - shape[0].length * blockSize) / 2;
            const offsetY = (holdCanvas.height - shape.length * blockSize) / 2;

            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        const padding = 2;
                        holdCtx.fillStyle = COLORS[holdPiece.color];
                        holdCtx.fillRect(
                            offsetX + x * blockSize + padding,
                            offsetY + y * blockSize + padding,
                            blockSize - padding * 2,
                            blockSize - padding * 2
                        );
                    }
                }
            }
        }

        // ========== COLLISION ==========
        function collision(offsetX = 0, offsetY = 0, shape = currentPiece.shape) {
            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        const newX = currentPiece.x + x + offsetX;
                        const newY = currentPiece.y + y + offsetY;

                        if (newX < 0 || newX >= COLS || newY >= ROWS) {
                            return true;
                        }

                        if (newY >= 0 && board[newY][newX]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // ========== MERGE ==========
        function merge() {
            const now = performance.now();
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        const boardY = currentPiece.y + y;
                        if (boardY >= 0) {
                            board[boardY][currentPiece.x + x] = currentPiece.color;
                            blockPlaceTime[boardY][currentPiece.x + x] = now;
                        }
                    }
                }
            }
        }

        // ========== T-SPIN DETECTION ==========
        function isTSpin() {
            if (currentPiece.color !== 6) return false; // Not a T-piece
            if (!lastMoveWasRotation) return false;

            // Find center of T-piece (the center block of the T)
            // T-piece rotations always have a center; check 4 diagonal corners
            const shape = currentPiece.shape;
            let centerX = -1, centerY = -1;

            // Find the center of rotation for T piece
            // In all T rotations, the center is at the intersection point
            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        // For T-piece, the center is where 3 blocks connect
                        // Check if this could be center by counting adjacent filled cells
                        let adj = 0;
                        if (y > 0 && x < shape[y-1].length && shape[y-1][x]) adj++;
                        if (y < shape.length - 1 && x < shape[y+1].length && shape[y+1][x]) adj++;
                        if (x > 0 && shape[y][x-1]) adj++;
                        if (x < shape[y].length - 1 && shape[y][x+1]) adj++;
                        if (adj >= 2) {
                            centerX = currentPiece.x + x;
                            centerY = currentPiece.y + y;
                            break;
                        }
                    }
                }
                if (centerX !== -1) break;
            }

            if (centerX === -1) return false;

            // Check 4 diagonal corners around center
            let filledCorners = 0;
            const corners = [[-1,-1], [1,-1], [-1,1], [1,1]];
            for (const [dx, dy] of corners) {
                const cx = centerX + dx;
                const cy = centerY + dy;
                if (cx < 0 || cx >= COLS || cy < 0 || cy >= ROWS || (cy >= 0 && board[cy][cx])) {
                    filledCorners++;
                }
            }

            return filledCorners >= 3;
        }

        // ========== ROTATION ==========
        function rotate() {
            const shape = currentPiece.shape;
            const rows = shape.length;
            const cols = shape[0].length;
            const rotated = Array(cols).fill(null).map(() => Array(rows).fill(0));

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    rotated[x][rows - 1 - y] = shape[y][x];
                }
            }

            const kicks = [0, -1, 1, -2, 2];
            for (const kick of kicks) {
                if (!collision(kick, 0, rotated)) {
                    currentPiece.x += kick;
                    currentPiece.shape = rotated;
                    lastMoveWasRotation = true;
                    playSound('rotate');

                    // Reset lock delay on rotation
                    if (isLocking && lockResets < MAX_LOCK_RESETS) {
                        lockTimer = 0;
                        lockResets++;
                    }
                    return;
                }
            }
        }

        // ========== LINE CLEARING ==========
        function findFullRows() {
            const fullRows = [];
            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    fullRows.push(y);
                }
            }
            return fullRows;
        }

        function startLineClearAnimation(rows) {
            clearingRows = rows;
            clearAnimTimer = 0;
            clearAnimPhase = 0;
        }

        function processLineClear() {
            const linesCleared = clearingRows.length;
            const wasTSpin = isTSpinForClear;

            // Remove rows
            for (const row of clearingRows.sort((a, b) => b - a)) {
                board.splice(row, 1);
                board.unshift(Array(COLS).fill(0));
                blockPlaceTime.splice(row, 1);
                blockPlaceTime.unshift(Array(COLS).fill(0));
            }

            // Scoring
            let points = 0;
            let isSpecialClear = false;

            if (wasTSpin) {
                playSound('tSpin');
                const tSpinPoints = [0, 800, 1200, 1600];
                points = tSpinPoints[Math.min(linesCleared, 3)] * level;
                const labels = ['', 'T-SPIN SINGLE!', 'T-SPIN DOUBLE!', 'T-SPIN TRIPLE!'];
                showPopup(labels[Math.min(linesCleared, 3)], 'tspin');
                isSpecialClear = true;
            } else if (linesCleared === 4) {
                points = 800 * level;
                playSound('tetris');
                showPopup('TETRIS!', 'tetris');
                isSpecialClear = true;
            } else {
                const basePoints = [0, 100, 300, 500, 800];
                points = basePoints[linesCleared] * level;
                if (linesCleared > 0) playSound('lineClear');
            }

            // Back-to-back bonus
            if (isSpecialClear && lastClearWasSpecial) {
                points = Math.floor(points * 1.5);
                showPopup('BACK-TO-BACK!', 'b2b');
            }
            lastClearWasSpecial = isSpecialClear;

            // Combo
            comboCount++;
            if (comboCount > 0) {
                const comboBonus = 50 * comboCount * level;
                points += comboBonus;
                showPopup('COMBO x' + comboCount + '!', 'combo');
                playSound('combo');
            }

            score += points;
            lines += linesCleared;

            // Victory check at level 20
            if (level === MAX_LEVEL) {
                linesAtLevel20 += linesCleared;
                if (linesAtLevel20 >= VICTORY_LINES_AT_20) {
                    victory();
                    return;
                }
            }

            updateScore();
            updateLines();

            // Level up
            const newLevel = Math.min(MAX_LEVEL, startLevel + Math.floor(lines / LINES_PER_LEVEL));
            if (newLevel !== level) {
                const oldLevel = level;
                level = newLevel;
                dropInterval = LEVEL_SPEEDS[level - 1];
                updateLevelDisplay();
                playSound('levelUp');
                showPopup('LEVEL ' + level + '!', 'levelup');

                // Milestone: Level 5 garbage row
                if (oldLevel < 5 && level >= 5) {
                    addGarbageRow();
                }
                // Additional garbage rows at milestone crossings
                for (let milestone = 5; milestone <= level; milestone += 5) {
                    if (oldLevel < milestone && level >= milestone && milestone !== 5) {
                        // Only L5 adds garbage per plan, but we only fire once
                    }
                }
            }

            clearingRows = null;
            clearAnimTimer = 0;
            clearAnimPhase = 0;
        }

        let isTSpinForClear = false;

        function clearLines() {
            const fullRows = findFullRows();

            if (fullRows.length > 0) {
                isTSpinForClear = isTSpin();
                startLineClearAnimation(fullRows);
            } else {
                // No lines cleared - reset combo
                comboCount = -1;
                spawnPiece();
            }
        }

        // ========== GARBAGE ROWS ==========
        function addGarbageRow() {
            // Remove top row, add garbage row at bottom with one random gap
            board.shift();
            blockPlaceTime.shift();
            const gap = Math.floor(Math.random() * COLS);
            const garbageRow = Array(COLS).fill(7); // Red colored
            garbageRow[gap] = 0;
            board.push(garbageRow);
            const timesRow = Array(COLS).fill(performance.now());
            timesRow[gap] = 0;
            blockPlaceTime.push(timesRow);
        }

        // ========== MOVEMENT ==========
        function drop() {
            if (!collision(0, 1)) {
                currentPiece.y++;
                lastMoveWasRotation = false;
                // If piece was locking but moved down, reset
                if (isLocking) {
                    isLocking = false;
                    lockTimer = 0;
                }
            } else {
                // Start lock delay if not already locking
                if (!isLocking) {
                    isLocking = true;
                    lockTimer = 0;
                    lockResets = 0;
                }
            }
            dropCounter = 0;
        }

        function lockPiece() {
            merge();
            isLocking = false;
            lockTimer = 0;
            lockResets = 0;
            clearLines();
        }

        function hardDrop() {
            while (!collision(0, 1)) {
                currentPiece.y++;
                score += 2;
            }
            updateScore();
            playSound('hardDrop');
            // Hard drop locks immediately
            merge();
            isLocking = false;
            lockTimer = 0;
            lockResets = 0;
            clearLines();
        }

        function move(dir) {
            if (!collision(dir, 0)) {
                currentPiece.x += dir;
                lastMoveWasRotation = false;
                playSound('move');

                // Reset lock delay on move
                if (isLocking && lockResets < MAX_LOCK_RESETS) {
                    lockTimer = 0;
                    lockResets++;
                }
            }
        }

        // ========== INPUT ==========
        function handleKeyPress(e) {
            if (isGameOver) return;

            if (e.key === 'p' || e.key === 'P') {
                togglePause();
                return;
            }

            if (isPaused) return;
            if (clearingRows) return; // No input during clear animation

            switch (e.key) {
                case 'ArrowLeft':
                    move(-1);
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    move(1);
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    drop();
                    score += 1;
                    updateScore();
                    e.preventDefault();
                    break;
                case 'ArrowUp':
                    rotate();
                    e.preventDefault();
                    break;
                case ' ':
                    hardDrop();
                    e.preventDefault();
                    break;
                case 'c':
                case 'C':
                case 'Shift':
                    holdCurrentPiece();
                    break;
            }
        }

        // ========== PAUSE / GAME OVER / VICTORY ==========
        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pausedOverlay').classList.toggle('hidden', !isPaused);
            if (!isPaused) {
                lastTime = performance.now();
                gameLoop = requestAnimationFrame(update);
            }
        }

        function gameOver() {
            isGameOver = true;
            cancelAnimationFrame(gameLoop);
            playSound('gameOver');
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLevel').textContent = level;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function victory() {
            isGameOver = true;
            cancelAnimationFrame(gameLoop);
            playSound('victory');
            document.getElementById('victoryScore').textContent = score;
            document.getElementById('victoryScreen').classList.remove('hidden');
        }

        // ========== LOCK DELAY HELPER ==========
        function getLockDelay() {
            if (level >= 18) return 200;
            if (level >= 15) return 300;
            return BASE_LOCK_DELAY;
        }

        // ========== UPDATE LOOP ==========
        function update(time) {
            if (isPaused || isGameOver) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            // Line clear animation
            if (clearingRows) {
                clearAnimTimer += deltaTime;
                // 3 flashes over ~400ms: each flash is ~133ms (66ms on, 66ms off)
                clearAnimPhase = Math.floor(clearAnimTimer / 66);
                if (clearAnimTimer >= 400) {
                    processLineClear();
                    if (!isGameOver && !clearingRows) {
                        spawnPiece();
                    }
                }
                draw();
                gameLoop = requestAnimationFrame(update);
                return;
            }

            // Lock delay
            if (isLocking) {
                lockTimer += deltaTime;
                if (lockTimer >= getLockDelay()) {
                    lockPiece();
                    draw();
                    gameLoop = requestAnimationFrame(update);
                    return;
                }
                // Also check if piece is no longer grounded (e.g., lines cleared below)
                if (!collision(0, 1)) {
                    isLocking = false;
                    lockTimer = 0;
                }
            }

            // Normal drop
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                drop();
            }

            draw();
            gameLoop = requestAnimationFrame(update);
        }

        // ========== DRAWING ==========
        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = '#1a1a3a';
            ctx.lineWidth = 1;
            for (let x = 0; x <= COLS; x++) {
                ctx.beginPath();
                ctx.moveTo(x * BLOCK_SIZE, 0);
                ctx.lineTo(x * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= ROWS; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * BLOCK_SIZE);
                ctx.lineTo(canvas.width, y * BLOCK_SIZE);
                ctx.stroke();
            }

            const now = performance.now();

            // Draw board
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x]) {
                        // Check if this row is being cleared (flash animation)
                        if (clearingRows && clearingRows.includes(y)) {
                            // Flash: odd phases are white, even phases are normal
                            if (clearAnimPhase % 2 === 1) {
                                drawBlock(ctx, x, y, '#ffffff');
                            } else {
                                drawBlock(ctx, x, y, COLORS[board[y][x]]);
                            }
                            continue;
                        }

                        // Milestone effects based on level
                        let alpha = 1;
                        const placeAge = now - blockPlaceTime[y][x];

                        if (level >= 20 && blockPlaceTime[y][x] > 0 && placeAge > 1000) {
                            // Level 20: fully invisible after 1s
                            alpha = 0;
                        } else if (level >= 15 && blockPlaceTime[y][x] > 0 && placeAge > 2000) {
                            // Level 15-19: fade to 50% after 2s
                            alpha = 0.5;
                        }

                        if (alpha > 0) {
                            ctx.globalAlpha = alpha;
                            drawBlock(ctx, x, y, COLORS[board[y][x]]);
                            ctx.globalAlpha = 1;
                        }
                    }
                }
            }

            if (!clearingRows && currentPiece) {
                // Draw ghost piece
                let ghostY = currentPiece.y;
                while (!collision(0, ghostY - currentPiece.y + 1)) {
                    ghostY++;
                }
                ctx.globalAlpha = 0.3;
                for (let y = 0; y < currentPiece.shape.length; y++) {
                    for (let x = 0; x < currentPiece.shape[y].length; x++) {
                        if (currentPiece.shape[y][x]) {
                            drawBlock(ctx, currentPiece.x + x, ghostY + y, COLORS[currentPiece.color]);
                        }
                    }
                }
                ctx.globalAlpha = 1;

                // Draw current piece
                for (let y = 0; y < currentPiece.shape.length; y++) {
                    for (let x = 0; x < currentPiece.shape[y].length; x++) {
                        if (currentPiece.shape[y][x]) {
                            drawBlock(ctx, currentPiece.x + x, currentPiece.y + y, COLORS[currentPiece.color]);
                        }
                    }
                }
            }
        }

        function drawBlock(context, x, y, color) {
            const padding = 2;
            context.fillStyle = color;
            context.fillRect(
                x * BLOCK_SIZE + padding,
                y * BLOCK_SIZE + padding,
                BLOCK_SIZE - padding * 2,
                BLOCK_SIZE - padding * 2
            );

            // Add highlight
            context.fillStyle = 'rgba(255, 255, 255, 0.3)';
            context.fillRect(
                x * BLOCK_SIZE + padding,
                y * BLOCK_SIZE + padding,
                BLOCK_SIZE - padding * 2,
                4
            );

            // Add shadow
            context.fillStyle = 'rgba(0, 0, 0, 0.3)';
            context.fillRect(
                x * BLOCK_SIZE + padding,
                y * BLOCK_SIZE + BLOCK_SIZE - padding - 4,
                BLOCK_SIZE - padding * 2,
                4
            );
        }

        function drawNextPiece() {
            nextCtx.fillStyle = '#0a0a1a';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

            const shape = nextPiece.shape;
            const blockSize = 25;
            const offsetX = (nextCanvas.width - shape[0].length * blockSize) / 2;
            const offsetY = (nextCanvas.height - shape.length * blockSize) / 2;

            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        const padding = 2;
                        nextCtx.fillStyle = COLORS[nextPiece.color];
                        nextCtx.fillRect(
                            offsetX + x * blockSize + padding,
                            offsetY + y * blockSize + padding,
                            blockSize - padding * 2,
                            blockSize - padding * 2
                        );
                    }
                }
            }
        }

        // ========== UI UPDATES ==========
        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function updateLines() {
            document.getElementById('lines').textContent = lines;
            const linesInCurrentLevel = lines % LINES_PER_LEVEL;
            const toNext = LINES_PER_LEVEL - linesInCurrentLevel;
            if (level < MAX_LEVEL) {
                document.getElementById('linesDetail').textContent = linesInCurrentLevel + ' of ' + LINES_PER_LEVEL + ' (' + toNext + ' to next)';
            } else {
                const remaining = VICTORY_LINES_AT_20 - linesAtLevel20;
                document.getElementById('linesDetail').textContent = linesAtLevel20 + ' of ' + VICTORY_LINES_AT_20 + ' to victory';
            }
        }

        // ========== START ==========
        init();
    </script>
</body>
</html>
